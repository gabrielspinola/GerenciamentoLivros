{% extends 'base.html' %}

{% block title %}Usuário - Gerenciamento de Livros{% endblock %}

{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8">
            {% if acao == "novo" %} 
             <form class="row g-3" id="formAluguel" method="POST" action="/alugarLivro" novalidate>
            {% else %} 
             <form class="row g-3" id="formAluguel" method="POST" action="/alugarLivro/{{ livroAlugado.idLivrosAlugados }}" novalidate>
            {% endif %}
                <div class="col-md-6">
                    <label for="idusuario" class="form-label">Usuário</label>
                    <select class="form-select" id="idusuario" name="idusuario" required {% if acao == "alterar" %} disabled {% endif %}>
                        <option value="0" {% if livroAlugado.idusuario == 0 %}selected{% endif %}> -- Selecione um usuário --</option>
                        {% for usuario in usuarios %}
                        <option value="{{ usuario.idusuario }}" {% if usuario.idusuario == livroAlugado.idusuario %}selected{% endif %}>
                            {{ usuario.nome }}
                        </option>
                        {% endfor %}
                    </select>
                    <input type="hidden" name="idusuario" value="{{ livroAlugado.idusuario }}">
                    <div class="invalid-feedback">
                        Por favor, selecione um usuário.
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="idlivro" class="form-label">Titulo</label>
                    <select class="form-select" id="idlivro" name="idlivro" required {% if acao == "alterar" %} disabled {% endif %}>
                        <option value="0" {% if livroAlugado.idlivro == 0 %}selected{% endif %}> -- Selecione um livro --</option>
                        {% for livroDisponivel in livrosDisponiveis %}
                        <option value="{{ livroDisponivel.idlivro }}" {% if livroDisponivel.idlivro == livroAlugado.idlivro %}selected{% endif %}>
                            {{ livroDisponivel.titulo }}
                        </option>
                        {% endfor %}
                    </select>
                    <input type="hidden" name="idlivro" value="{{ livroAlugado.idlivro }}">
                    <div class="invalid-feedback">
                        Por favor, selecione um livro.
                    </div>
                </div>
                <div class="col-md-6">
                    <label for="dataAluguel" class="form-label">Data de Aluguel</label>
                    <input type="date" class="form-control" id="dataAluguel" name="dataAluguel" {% if acao == "novo" %} readonly {% endif %}
                           {% if livroAlugado.dataAluguel == ""%} value="{{ datetime.now().strftime('%Y-%m-%d') }}"{% else %} value="{{ livroAlugado.dataAluguel }}"{% endif %}>
                </div>
                <div class="col-md-6">
                    <label for="dataDevolucao" class="form-label">Data de Devolução(Prevista)</label>
                    <input type="date" class="form-control" id="dataDevolucao" name="dataDevolucao" {% if acao == "novo" %} readonly {% endif %}
                        {% if livroAlugado.dataDevolucao == ""%} value="{{ data_Prev_Devolucao }}"{% else %} value="{{ livroAlugado.dataDevolucao }}"{% endif %}>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Salvar</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
    document.getElementById('formAluguel').addEventListener('submit', function(event) {
        const form = event.target;
        let isValid = true;

        // Validar se usuário foi selecionado
        const idusuario = document.getElementById('idusuario').value;
        if (idusuario === '0' || idusuario === '') {
            isValid = false;
            document.getElementById('idusuario').classList.add('is-invalid');
        } else {
            document.getElementById('idusuario').classList.remove('is-invalid');
        }

        // Validar se livro foi selecionado
        const idlivro = document.getElementById('idlivro').value;
        if (idlivro === '0' || idlivro === '') {
            isValid = false;
            document.getElementById('idlivro').classList.add('is-invalid');
        } else {
            document.getElementById('idlivro').classList.remove('is-invalid');
        }

        // Se não é válido, previne o envio do formulário
        if (!isValid) {
            event.preventDefault();
            event.stopPropagation();
        }
    });
</script>
{% endblock %}

{% block head %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
{% endblock %}
